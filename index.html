<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#111111">
<title>Noten</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f4f0;--surface:#ffffff;--surface2:#eeede9;--text:#111111;--text2:#666660;--text3:#aaa9a4;--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);--accent:#111111;--good:#2d6a1f;--goodbg:#eaf3de;--warn:#7a4a08;--warnbg:#faeeda;--bad:#8f2020;--badbg:#fcebeb;--radius:14px;--radius-sm:8px;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overscroll-behavior:none;}
.status-bar{height:var(--safe-top);background:var(--bg);}
.header{background:var(--bg);padding:16px 20px 0;position:sticky;top:0;z-index:10;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.logo-row{display:flex;align-items:center;gap:10px;}
.logo-box{width:36px;height:36px;background:#111;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-box span{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#fff;letter-spacing:-0.5px;}
.app-name{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--text);}
.notif-btn{width:36px;height:36px;border-radius:50%;background:var(--surface);border:0.5px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;}
.notif-btn svg{width:18px;height:18px;}
.notif-dot{width:8px;height:8px;background:#E24B4A;border-radius:50%;position:absolute;top:4px;right:4px;border:2px solid var(--bg);display:none;}
.tabs{display:flex;gap:4px;padding-bottom:14px;}
.tab{flex:1;padding:8px 0;text-align:center;font-size:13px;font-weight:500;color:var(--text3);border-radius:var(--radius-sm);cursor:pointer;border:none;background:transparent;transition:all 0.15s;}
.tab.active{background:var(--surface);color:var(--text);border:0.5px solid var(--border2);}
.scroll-area{padding:0 16px;padding-bottom:calc(100px + var(--safe-bottom));}
.page{display:none;}
.page.active{display:block;}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px;}
.stat-card{background:var(--surface);border-radius:var(--radius);padding:14px 12px;border:0.5px solid var(--border);}
.stat-label{font-size:10px;color:var(--text3);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:4px;}
.stat-val{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:var(--text);}
.stat-val.good{color:var(--good);}
.stat-val.warn{color:var(--warn);}
.stat-val.bad{color:var(--bad);}
.section-label{font-size:11px;font-weight:500;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:10px;}
.subjects{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
.subject-card{background:var(--surface);border-radius:var(--radius);border:0.5px solid var(--border);overflow:hidden;}
.subject-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;cursor:pointer;}
.subject-name{font-size:15px;font-weight:500;color:var(--text);}
.subject-right{display:flex;align-items:center;gap:10px;}
.subject-avg{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;}
.chevron{width:18px;height:18px;color:var(--text3);transition:transform 0.2s;flex-shrink:0;}
.chevron.open{transform:rotate(180deg);}
.bar-bg{height:3px;background:var(--surface2);margin:0 16px;}
.bar-fill{height:3px;border-radius:2px;transition:width 0.4s cubic-bezier(0.34,1.56,0.64,1);}
.subject-body{padding:12px 16px 14px;display:none;}
.subject-body.open{display:block;}
.grades-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.grade-pill{display:flex;align-items:center;gap:5px;background:var(--surface2);border-radius:8px;padding:6px 10px;font-size:14px;font-weight:500;color:var(--text);}
.grade-pill .del{color:var(--text3);font-size:16px;line-height:1;cursor:pointer;padding:0 1px;}
.empty-state{font-size:13px;color:var(--text3);margin-bottom:12px;}
.add-grade-row{display:flex;gap:8px;}
.add-grade-row input{flex:1;height:44px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-size:15px;font-family:'DM Sans',sans-serif;padding:0 12px;outline:none;}
.add-grade-row input:focus{border-color:var(--accent);}
.btn{height:44px;padding:0 16px;border-radius:var(--radius-sm);border:none;background:var(--accent);color:#fff;font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;white-space:nowrap;transition:opacity 0.15s,transform 0.1s;}
.btn:active{opacity:0.8;transform:scale(0.97);}
.btn.secondary{background:var(--surface2);color:var(--text);}
.del-subject-btn{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;background:var(--badbg);border:none;cursor:pointer;color:var(--bad);font-size:16px;flex-shrink:0;}
.grade-badge{display:inline-block;font-size:10px;font-weight:500;padding:2px 7px;border-radius:6px;margin-left:6px;vertical-align:middle;}
.test-list{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
.test-card{background:var(--surface);border-radius:var(--radius);border:0.5px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:14px;}
.test-card.urgent{border-color:#E24B4A;background:#fff9f9;}
.test-card.soon{border-color:#EF9F27;background:#fffbf5;}
.test-date-box{min-width:46px;text-align:center;background:var(--surface2);border-radius:10px;padding:8px 6px;}
.test-date-day{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--text);line-height:1;}
.test-date-mon{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-top:2px;}
.test-info{flex:1;}
.test-subject{font-size:14px;font-weight:500;color:var(--text);}
.test-type{font-size:12px;color:var(--text3);margin-top:2px;}
.test-days-left{font-size:12px;font-weight:500;border-radius:8px;padding:4px 10px;white-space:nowrap;}
.test-del{color:var(--text3);font-size:18px;cursor:pointer;padding:4px;}
.add-test-form{background:var(--surface);border-radius:var(--radius);border:0.5px solid var(--border);padding:16px;margin-bottom:20px;display:flex;flex-direction:column;gap:10px;}
.form-row{display:flex;flex-direction:column;gap:4px;}
.form-label{font-size:11px;color:var(--text3);letter-spacing:0.04em;text-transform:uppercase;}
.form-input{height:44px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-size:15px;font-family:'DM Sans',sans-serif;padding:0 12px;outline:none;width:100%;}
.form-input:focus{border-color:var(--accent);}
.alert-card{border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px;}
.alert-card.warn-alert{background:var(--warnbg);border:0.5px solid #EF9F27;}
.alert-card.bad-alert{background:var(--badbg);border:0.5px solid #E24B4A;}
.alert-card.good-alert{background:var(--goodbg);border:0.5px solid #639922;}
.alert-icon{font-size:20px;flex-shrink:0;margin-top:1px;}
.alert-title{font-size:14px;font-weight:500;color:var(--text);}
.alert-msg{font-size:13px;color:var(--text2);margin-top:2px;}
.threshold-row{display:flex;align-items:center;gap:10px;background:var(--surface);border-radius:var(--radius);border:0.5px solid var(--border);padding:14px 16px;margin-bottom:16px;}
.threshold-row label{font-size:13px;color:var(--text2);flex:1;}
.threshold-row input{width:70px;height:36px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-size:15px;font-family:'DM Sans',sans-serif;padding:0 10px;outline:none;text-align:center;}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:0.5px solid var(--border);padding:12px 16px;padding-bottom:calc(12px + var(--safe-bottom));display:flex;gap:8px;z-index:10;}
.bottom-bar input{flex:1;height:48px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-size:15px;font-family:'DM Sans',sans-serif;padding:0 14px;outline:none;}
.bottom-bar input:focus{border-color:var(--accent);}
.bottom-bar .btn{height:48px;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#111;color:#fff;font-size:13px;padding:10px 20px;border-radius:20px;opacity:0;transition:opacity 0.25s,transform 0.25s;white-space:nowrap;z-index:100;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.no-tests{text-align:center;padding:40px 0;color:var(--text3);font-size:14px;}
.todo-item{background:var(--surface);border-radius:var(--radius);border:0.5px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:8px;transition:opacity 0.3s;}
.todo-item.done{opacity:0.45;}
.todo-check{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--bg);transition:all 0.15s;}
.todo-check.checked{background:#111;border-color:#111;}
.todo-check svg{width:12px;height:12px;stroke:#fff;display:none;}
.todo-check.checked svg{display:block;}
.todo-info{flex:1;}
.todo-subject{font-size:12px;color:var(--text3);margin-bottom:2px;}
.todo-goal{font-size:14px;font-weight:500;color:var(--text);}
.todo-repeat{font-size:11px;color:var(--text3);margin-top:2px;}
.goal-card{background:var(--surface);border-radius:var(--radius);border:0.5px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.goal-info{flex:1;}
.goal-subject{font-size:11px;color:var(--text3);}
.goal-text{font-size:14px;font-weight:500;color:var(--text);margin:2px 0;}
.goal-meta{font-size:11px;color:var(--text3);}
.goal-del{color:var(--text3);font-size:18px;cursor:pointer;padding:4px;}
.td-item{background:var(--surface);border-radius:var(--radius);border:0.5px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:8px;transition:opacity 0.3s;}
.td-item.done{opacity:0.4;}
.td-item.done .td-task{text-decoration:line-through;color:var(--text3);}
.td-check{width:24px;height:24px;border-radius:7px;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--bg);transition:all 0.15s;}
.td-check.checked{background:#111;border-color:#111;}
.td-check svg{width:12px;height:12px;stroke:#fff;display:none;}
.td-check.checked svg{display:block;}
.td-info{flex:1;min-width:0;}
.td-task{font-size:14px;font-weight:500;color:var(--text);word-break:break-word;}
.td-meta{font-size:11px;color:var(--text3);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap;}
.td-overdue{color:var(--bad)!important;font-weight:500;}
.td-del{color:var(--text3);font-size:18px;cursor:pointer;padding:4px;flex-shrink:0;}
/* Custom Date Picker */
.dp-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.dp-sheet{background:#1a1a1a;border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:20px 20px calc(20px + env(safe-area-inset-bottom));color:#fff;}
.dp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.dp-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:#fff;}
.dp-close{font-size:22px;color:#666;cursor:pointer;padding:4px;}
.dp-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.dp-month{font-size:15px;font-weight:500;color:#fff;}
.dp-nav-btn{width:36px;height:36px;border-radius:50%;background:#2a2a2a;border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.dp-weekdays{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:8px;}
.dp-wd{text-align:center;font-size:11px;color:#666;padding:4px 0;}
.dp-days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.dp-day{height:40px;border-radius:10px;border:none;background:transparent;color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s;}
.dp-day:hover{background:#2a2a2a;}
.dp-day.today{color:#aaa;font-weight:700;}
.dp-day.selected{background:#fff;color:#111;font-weight:700;}
.dp-day.other-month{color:#444;}
.dp-day.disabled{color:#333;cursor:default;}
.dp-actions{display:flex;gap:10px;margin-top:20px;}
.dp-cancel{flex:1;height:48px;border-radius:12px;border:0.5px solid #333;background:transparent;color:#fff;font-size:15px;font-family:'DM Sans',sans-serif;cursor:pointer;}
.dp-set{flex:1;height:48px;border-radius:12px;border:none;background:#fff;color:#111;font-size:15px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;}
.date-display{height:44px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-size:15px;font-family:'DM Sans',sans-serif;padding:0 12px;outline:none;width:100%;display:flex;align-items:center;cursor:pointer;}
</style>
</head>
<body>
<div class="status-bar"></div>
<div class="header">
  <div class="header-top">
    <div class="logo-row">
      <div class="logo-box"><span>A+</span></div>
      <span class="app-name">Noten</span>
      <span style="font-size:10px;color:var(--text3);margin-left:4px">v2.0</span>
    </div>
    <div class="notif-btn" onclick="requestNotifPermission()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <div class="notif-dot" id="notif-dot"></div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('grades',this)">Noten</button>
    <button class="tab" onclick="switchTab('tests',this)">Prüfungen</button>
    <button class="tab" onclick="switchTab('lernplan',this)">Lernplan</button>
    <button class="tab" onclick="switchTab('alerts',this)">Hinweise</button>
  </div>
</div>

<div class="scroll-area">
  <div class="page active" id="page-grades">
    <div style="height:12px"></div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Schnitt</div><div class="stat-val" id="overall-avg">—</div></div>
      <div class="stat-card"><div class="stat-label">Fächer</div><div class="stat-val" id="subject-count">0</div></div>
      <div class="stat-card"><div class="stat-label">Noten</div><div class="stat-val" id="grade-count">0</div></div>
    </div>
    <div class="section-label">Meine Fächer</div>
    <div class="subjects" id="subjects-list"></div>
  </div>

  <div class="page" id="page-tests">
    <div style="height:12px"></div>
    <div class="section-label">Neue Prüfung</div>
    <div class="add-test-form">
      <div class="form-row"><div class="form-label">Fach</div><select class="form-input" id="test-subject-sel"><option value="">Fach wählen...</option></select></div>
      <div class="form-row"><div class="form-label">Art</div><select class="form-input" id="test-type-sel"><option>Prüfung</option><option>Test</option><option>Mündlich</option><option>Hausarbeit</option></select></div>
      <div class="form-row"><div class="form-label">Datum</div><div class="date-display" id="test-date-display" onclick="dpOpen('test-date-inp','Prüfungsdatum')">Datum wählen...</div><input type="hidden" id="test-date-inp"></div>
      <button class="btn" onclick="addTest()" style="width:100%">+ Prüfung hinzufügen</button>
    </div>
    <div class="section-label">Kommende Prüfungen</div>
    <div class="test-list" id="test-list"></div>
  </div>

  <div class="page" id="page-lernplan">
    <div style="height:12px"></div>
    <div class="section-label">Lernplan erstellen</div>
    <div class="add-test-form">
      <div class="form-row"><div class="form-label">Prüfung wählen</div>
        <select class="form-input" id="lp-exam-sel"><option value="">Prüfung wählen...</option></select>
      </div>
      <div class="form-row"><div class="form-label">Lernziele (eines pro Zeile)</div>
        <textarea class="form-input" id="lp-goals-txt" placeholder="z.B.&#10;Kapitel 1: Grundlagen&#10;Kapitel 2: Formeln&#10;Übungsaufgaben lösen" style="height:120px;padding:10px 12px;resize:none;font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5"></textarea>
      </div>
      <button class="btn" onclick="generatePlan()" style="width:100%">Lernplan generieren</button>
    </div>
    <div id="lp-result"></div>
    <div id="lp-today-section" style="display:none">
      <div class="section-label">Heute zu erledigen</div>
      <div id="todo-list"></div>
    </div>
    <div id="lp-all-section" style="display:none">
      <div class="section-label" style="margin-top:16px">Alle Lerneinheiten</div>
      <div id="goals-list"></div>
    </div>
  </div>

  <div class="page" id="page-alerts">
    <div style="height:12px"></div>
    <div class="section-label">Warnschwelle</div>
    <div class="threshold-row">
      <label>Warnung wenn Schnitt unter:</label>
      <input type="number" id="threshold-inp" min="1" max="6" step="0.5" value="4">
    </div>
    <div class="section-label">Aktuelle Hinweise</div>
    <div id="alerts-list"></div>
  </div>
</div>

<div id="dp-overlay" class="dp-overlay" style="display:none" onclick="dpClickOutside(event)">
  <div class="dp-sheet">
    <div class="dp-header">
      <div class="dp-title" id="dp-title">Datum wählen</div>
      <span class="dp-close" onclick="dpClose()">×</span>
    </div>
    <div class="dp-nav">
      <button class="dp-nav-btn" onclick="dpPrevMonth()">‹</button>
      <span class="dp-month" id="dp-month-label"></span>
      <button class="dp-nav-btn" onclick="dpNextMonth()">›</button>
    </div>
    <div class="dp-weekdays">
      <div class="dp-wd">Mo</div><div class="dp-wd">Di</div><div class="dp-wd">Mi</div>
      <div class="dp-wd">Do</div><div class="dp-wd">Fr</div><div class="dp-wd">Sa</div><div class="dp-wd">So</div>
    </div>
    <div class="dp-days" id="dp-days"></div>
    <div class="dp-actions">
      <button class="dp-cancel" onclick="dpClose()">Abbrechen</button>
      <button class="dp-set" onclick="dpConfirm()">Setzen</button>
    </div>
  </div>
</div>

<div class="bottom-bar" id="bottom-grades">
  <input type="text" id="new-subject-input" placeholder="Neues Fach..." maxlength="30">
  <button class="btn" onclick="addSubject()">+ Fach</button>
</div>
<div class="toast" id="toast"></div>

<script>
const SCALE_MIN=1,SCALE_MAX=6;
let openId=null,currentTab='grades';
let subjects=JSON.parse(localStorage.getItem('noten_subjects')||'null')||[{id:1,name:'Mathematik',grades:[5,4.5,5.5,4]},{id:2,name:'Deutsch',grades:[4,4.5,3.5]},{id:3,name:'Englisch',grades:[5.5,6,5]}];
let tests=JSON.parse(localStorage.getItem('noten_tests')||'[]');
let nextId=Math.max(...subjects.map(s=>s.id),0)+1;
let nextTestId=Math.max(...tests.map(t=>t.id||0),0)+1;
let threshold=parseFloat(localStorage.getItem('noten_threshold')||'4');
let goals=JSON.parse(localStorage.getItem('noten_goals')||'[]');
let nextGoalId=Math.max(...goals.map(g=>g.id||0),0)+1;
let todoDone=JSON.parse(localStorage.getItem('noten_tododone')||'{}');
// reset done list daily
const todayStr=new Date().toISOString().slice(0,10);
if(localStorage.getItem('noten_doneday')!==todayStr){todoDone={};localStorage.setItem('noten_tododone','{}');localStorage.setItem('noten_doneday',todayStr);}

function saveGoals(){localStorage.setItem('noten_goals',JSON.stringify(goals));localStorage.setItem('noten_tododone',JSON.stringify(todoDone));}

let todoItems=JSON.parse(localStorage.getItem('noten_todoitems')||'[]');
let nextTodoId=Math.max(...todoItems.map(t=>t.id||0),0)+1;
function saveTodo(){localStorage.setItem('noten_todoitems',JSON.stringify(todoItems));}

function addTodoItem(){
  const task=document.getElementById('td-task-inp').value.trim();
  const cat=document.getElementById('td-cat-sel').value;
  const due=document.getElementById('td-due-inp').value;
  if(!task){showToast('Bitte Aufgabe eingeben');return;}
  todoItems.push({id:nextTodoId++,task,cat,due,done:false,created:new Date().toISOString().slice(0,10)});
  saveTodo();renderTodo();
  document.getElementById('td-task-inp').value='';
  document.getElementById('td-due-inp').value='';
  showToast('Aufgabe hinzugefügt!');
}

function renderTodo(){
  const open=todoItems.filter(t=>!t.done);
  const done=todoItems.filter(t=>t.done);
  const today=new Date().toISOString().slice(0,10);

  function buildItem(t){
    const isOverdue=t.due&&t.due<today&&!t.done;
    const dueLabel=t.due?`Fällig: ${new Date(t.due).toLocaleDateString('de')}`:'';
    const item=document.createElement('div');
    item.className='td-item'+(t.done?' done':'');
    item.innerHTML=`
      <div class="td-check ${t.done?'checked':''}" data-tid="${t.id}">
        <svg viewBox="0 0 12 12" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 6 5 9 10 3"/></svg>
      </div>
      <div class="td-info">
        <div class="td-task">${t.task}</div>
        <div class="td-meta">
          <span>${t.cat}</span>
          ${dueLabel?`<span class="${isOverdue?'td-overdue':''}">${isOverdue?'⚠️ ':''} ${dueLabel}</span>`:''}
        </div>
      </div>
      <span class="td-del" data-tid="${t.id}">×</span>`;
    item.querySelector('.td-check').addEventListener('click',()=>{
      const i=todoItems.find(x=>x.id===parseInt(t.id));if(i){i.done=!i.done;saveTodo();renderTodo();}
    });
    item.querySelector('.td-del').addEventListener('click',()=>{
      todoItems=todoItems.filter(x=>x.id!==parseInt(t.id));saveTodo();renderTodo();showToast('Aufgabe gelöscht');
    });
    return item;
  }

  const openList=document.getElementById('td-open-list');
  openList.innerHTML='';
  if(!open.length){openList.innerHTML='<div class="no-tests" style="padding:16px 0">Keine offenen Aufgaben 🎉</div>';}
  else open.forEach(t=>openList.appendChild(buildItem(t)));

  const doneList=document.getElementById('td-done-list');
  doneList.innerHTML='';
  const lbl=document.getElementById('td-done-label');
  if(done.length){
    if(lbl)lbl.style.display='block';
    done.forEach(t=>doneList.appendChild(buildItem(t)));
  } else {
    if(lbl)lbl.style.display='none';
  }
}

function repeatLabel(r){return{none:'Einmalig',daily:'Täglich',every2:'Alle 2 Tage',every3:'Alle 3 Tage',weekly:'Wöchentlich'}[r]||r;}

function isDueToday(g){
  const start=new Date(g.date);start.setHours(0,0,0,0);
  const today=new Date();today.setHours(0,0,0,0);
  if(start>today)return false;
  if(g.repeat==='none'){const diff=Math.round((today-start)/86400000);return diff===0;}
  if(g.repeat==='daily')return true;
  if(g.repeat==='every2'){const diff=Math.round((today-start)/86400000);return diff%2===0;}
  if(g.repeat==='every3'){const diff=Math.round((today-start)/86400000);return diff%3===0;}
  if(g.repeat==='weekly'){const diff=Math.round((today-start)/86400000);return diff%7===0;}
  return false;
}
