<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#111111">
<title>Noten</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #eeede9;
    --text: #111111;
    --text2: #666660;
    --text3: #aaa9a4;
    --border: rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.14);
    --accent: #111111;
    --good: #2d6a1f;
    --goodbg: #eaf3de;
    --warn: #7a4a08;
    --warnbg: #faeeda;
    --bad: #8f2020;
    --badbg: #fcebeb;
    --radius: 14px;
    --radius-sm: 8px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overscroll-behavior: none;
  }

  .status-bar {
    height: var(--safe-top);
    background: var(--bg);
  }

  .header {
    background: var(--bg);
    padding: 16px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-box {
    width: 36px;
    height: 36px;
    background: #111111;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .logo-box span {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: -0.5px;
  }

  .app-name {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
  }

  .header-sub {
    font-size: 12px;
    color: var(--text3);
  }

  .scroll-area {
    padding: 0 16px;
    padding-bottom: calc(100px + var(--safe-bottom));
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }

  .stat-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px 12px;
    border: 0.5px solid var(--border);
  }

  .stat-label {
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .stat-val {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
  }

  .stat-val.good { color: var(--good); }
  .stat-val.warn { color: var(--warn); }
  .stat-val.bad  { color: var(--bad); }

  .section-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .subjects { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

  .subject-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 0.5px solid var(--border);
    overflow: hidden;
    transition: transform 0.15s;
  }

  .subject-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 10px;
    cursor: pointer;
  }

  .subject-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
  }

  .subject-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .subject-avg {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
  }

  .chevron {
    width: 18px;
    height: 18px;
    color: var(--text3);
    transition: transform 0.2s;
    flex-shrink: 0;
  }

  .chevron.open { transform: rotate(180deg); }

  .bar-bg {
    height: 3px;
    background: var(--surface2);
    margin: 0 16px;
  }

  .bar-fill {
    height: 3px;
    border-radius: 2px;
    transition: width 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }

  .subject-body {
    padding: 12px 16px 14px;
    display: none;
  }

  .subject-body.open { display: block; }

  .grades-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
  }

  .grade-pill {
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--surface2);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }

  .grade-pill .del {
    color: var(--text3);
    font-size: 16px;
    line-height: 1;
    cursor: pointer;
    padding: 0 1px;
  }

  .empty-state {
    font-size: 13px;
    color: var(--text3);
    margin-bottom: 12px;
  }

  .add-grade-row {
    display: flex;
    gap: 8px;
  }

  .add-grade-row input {
    flex: 1;
    height: 44px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    padding: 0 12px;
    outline: none;
  }

  .add-grade-row input:focus { border-color: var(--accent); }

  .btn {
    height: 44px;
    padding: 0 16px;
    border-radius: var(--radius-sm);
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s, transform 0.1s;
  }

  .btn:active { opacity: 0.8; transform: scale(0.97); }

  .btn.secondary {
    background: var(--surface2);
    color: var(--text);
  }

  .del-subject-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #fcebeb;
    border: none;
    cursor: pointer;
    color: #8f2020;
    font-size: 16px;
    transition: opacity 0.15s;
  }

  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    background: var(--surface);
    border-top: 0.5px solid var(--border);
    padding: 12px 16px;
    padding-bottom: calc(12px + var(--safe-bottom));
    display: flex;
    gap: 8px;
    z-index: 10;
  }

  .bottom-bar input {
    flex: 1;
    height: 48px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    padding: 0 14px;
    outline: none;
  }

  .bottom-bar input:focus { border-color: var(--accent); }

  .bottom-bar .btn { height: 48px; border-radius: var(--radius-sm); }

  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #111;
    color: #fff;
    font-size: 13px;
    padding: 10px 20px;
    border-radius: 20px;
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    white-space: nowrap;
    z-index: 100;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .grade-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 500;
    padding: 2px 7px;
    border-radius: 6px;
    margin-left: 6px;
    vertical-align: middle;
  }
</style>
</head>
<body>

<div class="status-bar"></div>

<div class="header">
  <div class="logo-row">
    <div class="logo-box"><span>A+</span></div>
    <span class="app-name">Noten</span>
  </div>
  <span class="header-sub">Notenverwaltung</span>
</div>

<div class="scroll-area">
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Schnitt</div>
      <div class="stat-val" id="overall-avg">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Fächer</div>
      <div class="stat-val" id="subject-count">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Noten</div>
      <div class="stat-val" id="grade-count">0</div>
    </div>
  </div>

  <div class="section-label">Meine Fächer</div>
  <div class="subjects" id="subjects-list"></div>
</div>

<div class="bottom-bar">
  <input type="text" id="new-subject-input" placeholder="Neues Fach..." maxlength="30" />
  <button class="btn" onclick="addSubject()">+ Fach</button>
</div>

<div class="toast" id="toast"></div>

<script>
  const SCALE_MIN = 1, SCALE_MAX = 6;
  let openId = null;

  let subjects = JSON.parse(localStorage.getItem('noten_subjects') || 'null') || [
    { id: 1, name: 'Mathematik', grades: [5, 4.5, 5.5, 4] },
    { id: 2, name: 'Deutsch', grades: [4, 4.5, 3.5] },
    { id: 3, name: 'Englisch', grades: [5.5, 6, 5] },
  ];
  let nextId = Math.max(...subjects.map(s => s.id), 0) + 1;

  function save() {
    localStorage.setItem('noten_subjects', JSON.stringify(subjects));
  }

  function avg(arr) {
    if (!arr.length) return null;
    return arr.reduce((a, b) => a + b, 0) / arr.length;
  }

  function gradeColor(v) {
    if (v === null) return 'var(--text3)';
    if (v >= 5) return 'var(--good)';
    if (v >= 4) return 'var(--warn)';
    return 'var(--bad)';
  }

  function barColor(v) {
    if (v >= 5) return '#639922';
    if (v >= 4) return '#EF9F27';
    return '#E24B4A';
  }

  function gradeBadge(v) {
    if (v === null) return '';
    if (v >= 5) return `<span class="grade-badge" style="background:var(--goodbg);color:var(--good)">gut</span>`;
    if (v >= 4) return `<span class="grade-badge" style="background:var(--warnbg);color:var(--warn)">ok</span>`;
    return `<span class="grade-badge" style="background:var(--badbg);color:var(--bad)">tief</span>`;
  }

  function render() {
    const list = document.getElementById('subjects-list');
    list.innerHTML = '';

    let allGrades = [];
    subjects.forEach(s => allGrades = allGrades.concat(s.grades));
    const overall = avg(allGrades);

    const oEl = document.getElementById('overall-avg');
    oEl.textContent = overall !== null ? overall.toFixed(2) : '—';
    oEl.className = 'stat-val' + (overall === null ? '' : overall >= 5 ? ' good' : overall >= 4 ? ' warn' : ' bad');
    document.getElementById('subject-count').textContent = subjects.length;
    document.getElementById('grade-count').textContent = allGrades.length;

    subjects.forEach(s => {
      const a = avg(s.grades);
      const pct = a !== null ? Math.round(((a - SCALE_MIN) / (SCALE_MAX - SCALE_MIN)) * 100) : 0;
      const isOpen = openId === s.id;

      const card = document.createElement('div');
      card.className = 'subject-card';

      const pillsHtml = s.grades.length
        ? s.grades.map((g, i) =>
            `<div class="grade-pill">${g % 1 === 0 ? g + '.0' : g}<span class="del" data-id="${s.id}" data-idx="${i}">×</span></div>`
          ).join('')
        : `<div class="empty-state">Noch keine Noten eingetragen.</div>`;

      card.innerHTML = `
        <div class="subject-head" data-sid="${s.id}">
          <span class="subject-name">${s.name}${gradeBadge(a)}</span>
          <div class="subject-right">
            <span class="subject-avg" style="color:${gradeColor(a)}">${a !== null ? a.toFixed(2) : '—'}</span>
            <svg class="chevron ${isOpen ? 'open' : ''}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </div>
        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${barColor(a || 0)}"></div></div>
        <div class="subject-body ${isOpen ? 'open' : ''}">
          <div class="grades-wrap">${pillsHtml}</div>
          <div class="add-grade-row">
            <input type="number" inputmode="decimal" min="1" max="6" step="0.5" placeholder="Note (1–6)" id="gi-${s.id}" />
            <button class="btn" data-add="${s.id}">+ Note</button>
            <button class="del-subject-btn" data-del="${s.id}" title="Fach löschen">✕</button>
          </div>
        </div>
      `;

      list.appendChild(card);
    });

    list.querySelectorAll('.subject-head').forEach(el => {
      el.addEventListener('click', () => {
        const sid = parseInt(el.dataset.sid);
        openId = openId === sid ? null : sid;
        render();
      });
    });

    list.querySelectorAll('.del').forEach(el => {
      el.addEventListener('click', e => {
        e.stopPropagation();
        const id = parseInt(el.dataset.id);
        const idx = parseInt(el.dataset.idx);
        const s = subjects.find(x => x.id === id);
        if (s) { s.grades.splice(idx, 1); save(); render(); }
      });
    });

    list.querySelectorAll('[data-add]').forEach(btn => {
      btn.addEventListener('click', () => addGrade(parseInt(btn.dataset.add)));
    });

    list.querySelectorAll('[data-del]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = parseInt(btn.dataset.del);
        subjects = subjects.filter(x => x.id !== id);
        if (openId === id) openId = null;
        save(); render();
        showToast('Fach gelöscht');
      });
    });
  }

  function addGrade(id) {
    const inp = document.getElementById('gi-' + id);
    const v = parseFloat(inp.value.replace(',', '.'));
    if (isNaN(v) || v < 1 || v > 6) {
      inp.style.borderColor = 'var(--bad)';
      setTimeout(() => inp.style.borderColor = '', 800);
      showToast('Note muss zwischen 1 und 6 liegen');
      return;
    }
    const s = subjects.find(x => x.id === id);
    if (s) { s.grades.push(Math.round(v * 2) / 2); inp.value = ''; save(); render(); showToast(`Note ${v} hinzugefügt`); }
  }

  function addSubject() {
    const inp = document.getElementById('new-subject-input');
    const name = inp.value.trim();
    if (!name) return;
    const s = { id: nextId++, name, grades: [] };
    subjects.push(s);
    openId = s.id;
    inp.value = '';
    save(); render();
    showToast(`"${name}" hinzugefügt`);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(window._tt);
    window._tt = setTimeout(() => t.classList.remove('show'), 2000);
  }

  document.getElementById('new-subject-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addSubject();
  });

  render();
</script>
</body>
</html>
